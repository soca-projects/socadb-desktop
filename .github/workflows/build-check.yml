name: Build check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src-tauri/**'
      - 'mcp-server/**'
      - 'scripts/linux/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build.yml'
      - '.github/workflows/build-check.yml'
      - '.github/workflows/release.yml'
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'mcp-server/**'
      - 'scripts/linux/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build.yml'
      - '.github/workflows/build-check.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Required because the called build.yml job requests contents: write
    # (tauri-action needs it in publish mode). Reusable workflows can't
    # elevate beyond the caller's permissions, so we have to grant it here.
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      publish: false
