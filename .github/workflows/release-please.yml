name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-22.04
    steps:
      # Generate an installation token for the socadb-release-bot GitHub App.
      # We use the App's token instead of the default GITHUB_TOKEN so the PR
      # release-please opens is authored by the App and triggers downstream
      # workflows (CI, build-check). PRs opened with GITHUB_TOKEN are skipped
      # by GitHub's anti-loop protection and don't fire workflow triggers.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
