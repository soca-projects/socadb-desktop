name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Keep in sync with release.yml and BUN_VERSION in mcp-server/src/build.ts.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  rust:
    name: Rust checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Create MCP placeholders for Tauri resource globs
        run: |
          mkdir -p mcp-server/dist mcp-server/dist/runtime
          touch mcp-server/dist/socadb-mcp-linux-x64
          touch mcp-server/dist/runtime/.placeholder

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
