name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Keep in sync with release.yml and BUN_VERSION in mcp-server/src/build.ts.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.3

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      # Catches Vite-specific failures (asset resolution, plugin config) that
      # `tsc --noEmit` misses. Cheaper than running the full Tauri bundle on
      # every PR while still failing fast on broken frontend builds.
      - name: Build (Vite)
        run: bun run build

      - name: Test
        run: bun run test

  mcp-server:
    name: MCP server checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Keep in sync with release.yml and BUN_VERSION in mcp-server/src/build.ts.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.3

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: mcp-server
        run: bunx tsc --noEmit

  rust:
    name: Rust checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write   # rustsec/audit-check creates issues for advisories
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Create MCP placeholders for Tauri resource globs
        run: |
          mkdir -p mcp-server/dist mcp-server/dist/runtime
          touch mcp-server/dist/socadb-mcp-linux-x64
          touch mcp-server/dist/runtime/.placeholder

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
