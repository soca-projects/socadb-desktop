name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bunTarget: darwin-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bunTarget: darwin-x64
          - platform: ubuntu-22.04
            args: '--verbose'
            bunTarget: linux-x64
          - platform: windows-latest
            args: ''
            bunTarget: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Keep in sync with BUN_VERSION in mcp-server/src/build.ts so the bun
      # that runs the build matches the bun we bundle into the release.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Override Tauri's pinned linuxdeploy-plugin-gtk with our patched version
      # that tolerates Bun-compiled / static binaries inside the AppDir. Without
      # this, AppImage bundling crashes because linuxdeploy runs `ldd` on the
      # bundled @anthropic-ai/claude-agent-sdk-linux-x64/claude binary and
      # aborts on exit code 1. See scripts/linux/linuxdeploy-plugin-gtk.sh
      # for the full rationale.
      - name: Install patched linuxdeploy-plugin-gtk
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p ~/.cache/tauri
          cp scripts/linux/linuxdeploy-plugin-gtk.sh ~/.cache/tauri/linuxdeploy-plugin-gtk.sh
          chmod +x ~/.cache/tauri/linuxdeploy-plugin-gtk.sh

      # Build the GitHub release body from CHANGELOG.md so each release ships
      # with hand-curated notes plus a permanent install section. RC and beta
      # tags fall back to a generic body since they are not expected to have
      # a CHANGELOG entry of their own — they document the next stable
      # version's section.
      - name: Build release body
        id: release_body
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # For pre-release tags like v0.1.1-rc.5, target the parent stable
          # version's CHANGELOG section.
          base_version="${version%-rc.*}"
          base_version="${base_version%-beta.*}"
          notes=$(awk -v v="$base_version" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" v "\\]") { found = 1; next }
              next
            }
            /^\[.+\]:[[:space:]]/ { if (found) exit }
            found { print }
          ' CHANGELOG.md)
          {
            echo "body<<RELEASEBODY_EOF"
            if [ -n "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
              printf %s "$notes"
              echo ""
            else
              echo "Pre-release build of v${base_version} for testing."
              echo ""
            fi
            echo "## Install"
            echo ""
            echo "- **macOS Apple Silicon**: \`SocaDB_${version}_aarch64.dmg\`"
            echo "- **macOS Intel**: \`SocaDB_${version}_x64.dmg\`"
            echo "- **Linux Debian/Ubuntu**: \`SocaDB_${version}_amd64.deb\`"
            echo "- **Linux universal**: \`SocaDB_${version}_amd64.AppImage\` (\`chmod +x\` then run)"
            echo "- **Windows**: \`SocaDB_${version}_x64-setup.exe\`"
            echo "RELEASEBODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile

      - name: Install MCP server dependencies
        run: cd mcp-server && bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: '1'
          NO_STRIP: 'true'
          BUN_TARGET: ${{ matrix.bunTarget }}
          # Bundler-level debug logging on Ubuntu only, so the underlying
          # linuxdeploy/appimagetool stderr surfaces in CI when the AppImage
          # step fails. Tauri propagates this through tracing; the env var
          # alone wouldn't reach linuxdeploy because Tauri invokes it with a
          # fixed argv.
          RUST_LOG: ${{ matrix.platform == 'ubuntu-22.04' && 'tauri_bundler=debug,tauri_cli=debug' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SocaDB ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_body.outputs.body }}
          # Tags like v1.2.3-rc.1 / v1.2.3-beta.2 ship as drafts/prereleases so
          # the auto-update channel keeps pointing at the last stable tag.
          releaseDraft: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          args: ${{ matrix.args }}

      - name: Upload AppImage debug artifacts on failure
        if: failure() && matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-debug-${{ github.ref_name }}
          # Restrict to the partial AppImage tree and any tool logs. Exclude
          # signed updater outputs and the public release manifest so a
          # rogue verbose log can't ride along.
          path: |
            src-tauri/target/release/bundle/appimage/
            src-tauri/target/release/bundle/deb/
            **/linuxdeploy*.log
            **/appimagetool*.log
            !**/*.sig
            !**/latest.json
          if-no-files-found: ignore
          retention-days: 7
