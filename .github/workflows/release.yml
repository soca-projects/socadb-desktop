name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            bunTarget: darwin-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            bunTarget: darwin-x64
          - platform: ubuntu-22.04
            args: ''
            bunTarget: linux-x64
          - platform: windows-latest
            args: ''
            bunTarget: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Keep in sync with BUN_VERSION in mcp-server/src/build.ts so the bun
      # that runs the build matches the bun we bundle into the release.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: bun install --frozen-lockfile

      - name: Install MCP server dependencies
        run: cd mcp-server && bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: '1'
          NO_STRIP: 'true'
          BUN_TARGET: ${{ matrix.bunTarget }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SocaDB ${{ github.ref_name }}'
          releaseBody: 'Download SocaDB for your platform below.'
          # Tags like v1.2.3-rc.1 / v1.2.3-beta.2 ship as drafts/prereleases so
          # the auto-update channel keeps pointing at the last stable tag.
          releaseDraft: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          args: ${{ matrix.args }}
