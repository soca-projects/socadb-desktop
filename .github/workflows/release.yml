name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release notes
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      body: ${{ steps.release_body.outputs.body }}
      prerelease: ${{ steps.flags.outputs.prerelease }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Fail loudly if package.json / mcp-server/package.json / Cargo.toml /
      # tauri.conf.json drift from the tag. The Tauri bundle names embed the
      # tauri.conf.json version, so a mismatch produces artifacts whose
      # filenames don't match the install links we render below.
      - name: Verify version consistency
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          expected="${tag#v}"
          base="${expected%-rc.*}"
          base="${base%-beta.*}"

          extract_json() {
            grep -m1 '"version"' "$1" | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/'
          }
          extract_cargo() {
            grep -m1 '^version[[:space:]]*=' "$1" | sed 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/'
          }

          check() {
            file="$1"
            actual="$2"
            if [ "$actual" != "$base" ]; then
              echo "::error file=$file::version is '$actual', expected '$base' (from tag $tag)"
              return 1
            fi
          }

          mismatch=0
          check package.json "$(extract_json package.json)" || mismatch=1
          check mcp-server/package.json "$(extract_json mcp-server/package.json)" || mismatch=1
          check src-tauri/Cargo.toml "$(extract_cargo src-tauri/Cargo.toml)" || mismatch=1
          check src-tauri/tauri.conf.json "$(extract_json src-tauri/tauri.conf.json)" || mismatch=1

          if [ $mismatch -eq 1 ]; then
            echo "Version files are out of sync with tag $tag." >&2
            exit 1
          fi
          echo "All 4 version files match $base."

      # Build the GitHub release body from CHANGELOG.md so each release ships
      # with hand-curated notes plus a permanent install section. RC and beta
      # tags fall back to a generic body since they are not expected to have
      # a CHANGELOG entry of their own — they document the next stable
      # version's section.
      - name: Build release body
        id: release_body
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          # For pre-release tags like v0.1.1-rc.5, target the parent stable
          # version's CHANGELOG section.
          base_version="${version%-rc.*}"
          base_version="${base_version%-beta.*}"
          notes=$(awk -v v="$base_version" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" v "\\]") { found = 1; next }
              next
            }
            /^\[.+\]:[[:space:]]/ { if (found) exit }
            found { print }
          ' CHANGELOG.md)

          # Stable tags MUST have a CHANGELOG section — otherwise users get
          # the generic "Pre-release build of v..." body. RC/beta fall back
          # silently since they document the parent stable section.
          if [ -z "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
            if [[ "$tag" != *-rc* && "$tag" != *-beta* ]]; then
              echo "::error file=CHANGELOG.md::missing or empty section [$base_version] for stable tag $tag"
              exit 1
            fi
          fi

          {
            echo "body<<RELEASEBODY_EOF"
            if [ -n "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
              printf %s "$notes"
              echo ""
            else
              echo "Pre-release build of v${base_version} for testing."
              echo ""
            fi
            echo "## Install"
            echo ""
            echo "- **macOS Apple Silicon**: \`SocaDB_${version}_aarch64.dmg\`"
            echo "- **macOS Intel**: \`SocaDB_${version}_x64.dmg\`"
            echo "- **Linux Debian/Ubuntu**: \`SocaDB_${version}_amd64.deb\`"
            echo "- **Linux universal**: \`SocaDB_${version}_amd64.AppImage\` (\`chmod +x\` then run)"
            echo "- **Windows**: \`SocaDB_${version}_x64-setup.exe\`"
            echo "RELEASEBODY_EOF"
          } >> "$GITHUB_OUTPUT"

      # RC/beta are marked as prereleases so the auto-update channel keeps
      # pointing at the last stable tag.
      - name: Compute prerelease flag
        id: flags
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == *-rc* || "$REF_NAME" == *-beta* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # Purges the leftover draft if the previous run on this tag was retried,
  # so tauri-action doesn't mix new assets with stale ones.
  cleanup-stale-draft:
    needs: prepare
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Delete stale draft, refuse to overwrite published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          state=$(gh release view "$REF_NAME" --json isDraft --jq '.isDraft' --repo "$GITHUB_REPOSITORY" 2>/dev/null || echo MISSING)
          case "$state" in
            MISSING)
              echo "No existing release for $REF_NAME, proceeding."
              ;;
            true)
              echo "Deleting stale draft for $REF_NAME"
              gh release delete "$REF_NAME" --yes --cleanup-tag=false --repo "$GITHUB_REPOSITORY"
              ;;
            false)
              echo "::error::Release $REF_NAME already exists and is published. Refusing to re-release."
              echo "Delete the existing release manually if this is intentional, then re-push the tag."
              exit 1
              ;;
            *)
              echo "::error::Unexpected gh release view output: '$state'"
              exit 1
              ;;
          esac

  release:
    needs: [prepare, cleanup-stale-draft]
    # Required because the called build.yml job requests contents: write
    # (tauri-action needs it in publish mode). Reusable workflows can't
    # elevate beyond the caller's permissions, so we have to grant it here.
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      publish: true
      tag-name: ${{ github.ref_name }}
      release-body: ${{ needs.prepare.outputs.body }}
      prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
    secrets: inherit

  # All matrix legs publish to draft; this job flips the release to public
  # only after every leg has succeeded. RC/beta stay as draft permanently.
  promote:
    needs: release
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Promote draft to public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: gh release edit "$REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
